<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Scheduler Simulator</title>
</head>
<body>
    <div id="app">
        <!-- 왼쪽: Control Panel (1/4) -->
        <aside id="control-panel">
            <h2 class="title" style="color: #f43f5e;">⚔️ 로켓단 모의배틀 시뮬레이터</h2>

            <!-- 그룹 1: 포켓몬 난입 및 배틀 시작 -->
            <div class="control-group">
                <div class="button-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <button id="open-modal-btn" class="btn btn-primary" style="background-color: #333333; color: #ffffff; border: none; display: flex; align-items: center; justify-content: center; gap: 4px;">
                        <img src="/images/로켓단/로켓단로고.png" class="btn-logo"> 로켓단 포켓몬 난입
                    </button>                    <button id="run-btn" class="btn btn-success" style="background-color: #f43f5e; border: none; font-size: 1.1rem; font-weight: bold;">⚔️ 배틀 시작!</button>
                </div>
                <!-- 난입 대기 중인 로켓단 카운트 -->
                <div class="control-item" style="margin-top: 12px; padding: 8px; background: #fff1f2; border-radius: 8px;">
                    <span class="label" style="color: #e11d48;">난입 대기 라인업</span>
                    <span id="process-count-display" class="value font-bold" style="color: #be123c;">0 / 15</span>
                </div>
            </div>

            <!-- 그룹 2: 우리 팀 엔트리 설정 (기존 프로세서 설정) -->
            <div class="control-group core-settings">
                <h3 style="display: flex; align-items: center; gap: 6px;">🛡️ 우리 팀 엔트리</h3>
                <div id="core-container">
                    <!-- main.ts의 createCore 함수를 통해 리자몽, 뮤츠 등이 생성됨 -->
                </div>
            </div>

            <!-- 그룹 3: 포켓몬 에너지 소비 현황 (기존 소비 전력) -->
            <div class="control-group" id="power-dashboard" style="background: #f0f9ff; border: 1px solid #bae6fd;">
                <h3 style="color: #0369a1;">🔋 에너지 소비 현황</h3>
                <div class="power-item" style="font-weight: bold; border-bottom: 1px solid #bae6fd; padding-bottom: 4px; margin-bottom: 4px;">
                    <span>전체 에너지 합계:</span> <span id="total-w" style="color: #0284c7;">0 Wh</span>
                </div>
                <div class="power-item p-core" style="font-size: 12px; color: #7e22ce;">
                    <span>메가진화 팀 합계:</span> <span id="p-sum-w">0 Wh</span>
                </div>
                <div class="power-item e-core" style="font-size: 12px; color: #15803d; border-bottom: 1px solid #bae6fd; padding-bottom: 4px; margin-bottom: 8px;">
                    <span>노말 모드 팀 합계:</span> <span id="e-sum-w">0 Wh</span>
                </div>
                <!-- 개별 포켓몬 전력 소비 상세 정보가 들어갈 공간 -->
                <div id="individual-core-power" style="display: flex; flex-direction: column; gap: 4px;"></div>
            </div>
        </aside>

        <!-- 오른쪽: Output Panel (3/4) -->
        <main id="output-panel">
            <!-- ⚔️ 배틀 전략 및 필드 상황 (기존 Tabs 및 Gantt Chart) -->
            <section class="tabs-container">
                <div class="tabs-header">
                    <h4 class="font-bold" style="font-size: 14px; display: flex; align-items: center; margin: 0; padding-left: 8px;">
                        🏟️ 실시간 배틀필드 상황
                        <span id="battle-timer" style="margin-left: 10px; font-size: 12px; color: #f43f5e; font-family: monospace; background: #ffe4e6; padding: 2px 8px; border-radius: 4px; display: none;">Time: 0s</span>
                    </h4>
                    
                    <!-- RR 전략 선택 시 나타나는 상세 설정 -->
                    <div id="rr-quantum-control" class="quantum-box hidden" style="display: flex; align-items: center; gap: 6px; margin-left: auto; margin-right: 15px;">
                        <label style="font-size: 11px; color: #666; font-weight: 600;">교체 타이밍:</label>
                        <input type="number" id="realtime-tq" value="2" min="1" style="width: 40px; height: 22px; font-size: 11px; border: 1px solid #dee2e6; border-radius: 4px; padding: 0 4px;">
                    </div>

                    <!-- TVP 전략 선택 시 나타나는 상세 설정 -->
                    <div id="tvp-k-control" class="quantum-box hidden" style="display: flex; align-items: center; gap: 6px; margin-left: auto; margin-right: 15px;">
                        <label style="font-size: 11px; color: #666; font-weight: 600;">임계값 k:</label>
                        <input type="number" id="realtime-k" value="3" min="1" style="width: 40px; height: 22px; font-size: 11px; border: 1px solid #dee2e6; border-radius: 4px; padding: 0 4px;">
                    </div>

                    <div class="algo-buttons" style="display: flex; gap: 4px;">
                        <button class="tab-btn active" data-algo="FCFS">FCFS</button>
                        <button class="tab-btn" data-algo="RR">RR</button>
                        <button class="tab-btn" data-algo="SPN">SPN</button>
                        <button class="tab-btn" data-algo="SRTN">SRTN</button>
                        <button class="tab-btn" data-algo="HRRN">HRRN</button>
                        <button class="tab-btn" data-algo="OWN">TVP</button>
                    </div>
                </div>
                
                <div class="tab-content">
                    <!-- 🏟️ 실시간 배틀필드 (기존 Gantt Chart) -->
                    <div id="gantt-chart-area" style="position: relative;">
                        <!-- 배틀필드 위 활성 포켓몬 표시 (왼쪽 가운데 정렬) -->
                        <div id="battle-pokemon-container" class="battle-side-stage">
                            <!-- 아군 포켓몬 고정 컬럼 -->
                            <div id="ally-pokes-column" style="display: flex; flex-direction: column; justify-content: space-around; height: 100%; width: 80px; z-index: 10;"></div>
                            
                            <!-- 간트 트랙 통합 스크롤 영역 -->
                            <div id="unified-tracks-container" class="tracks-scroll-container">
                                <div id="tracks-inner-content" style="display: flex; flex-direction: column; justify-content: space-around; height: 100%; min-width: 100%;">
                                    <!-- 각 코어별 트랙이 여기에 들어감 -->
                                </div>
                            </div>
                        </div>

                        <!-- 로켓단 보스 (로사로이) : 배틀필드 전체의 정중앙(우측)에 고정 -->
                        <div id="enemy-boss-container">
                            <img src="/images/로켓단/로사로이.png" alt="로켓단">
                        </div>
                    </div>
                </div>
            </section>

            <!-- 🏃 난입 대기 포켓몬 (기존 Ready Queue) -->
            <section id="ready-queue-section" class="data-card">
                <h4 class="font-bold" style="font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                    🏃 난입 대기 포켓몬 
                    <span style="font-size: 11px; font-weight: normal; color: #666;">(배틀 필드 대기 중)</span>
                </h4>
                <div id="ready-queue-container">
                    <p class="empty-msg" style="color: #94a3b8; font-style: italic; font-size: 11px; margin: 0 auto;">현재 대기 중인 포켓몬이 없습니다.</p>
                </div>
            </section>

            <div class="data-view-container">
                <!-- 👾 로켓단 포켓몬 정보 (기존 Process Info) -->
                <div class="data-card">
                    <h4 class="font-bold flex items-center gap-2">
                        👾 로켓단 포켓몬 정보 
                        <span style="font-size: 11px; font-weight: normal; color: #666;">(AT: 난입시간 / HP: 체력)</span>
                    </h4>
                    <div id="input-table-view" class="table-wrapper">
                        <p class="empty-msg">로켓단 포켓몬을 추가해주세요.</p>
                    </div>
                </div>

                <!-- 🏆 배틀 결과 기록 (기존 Execution Results) -->
                <div class="data-card">
                    <h4 class="font-bold">🏆 배틀 결과 기록</h4>
                    <div id="result-table-view" class="table-wrapper">
                        <p class="empty-msg">배틀 결과가 여기에 표시됩니다.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 로켓단 포켓몬 난입 모달 -->
    <div id="process-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-tabs">
                <button id="tab-random" class="modal-tab-btn active">⚡ 무더기 난입</button>
                <button id="tab-manual" class="modal-tab-btn">🔍 타겟 지정</button>
            </div>

            <div class="modal-body">
                <!-- 무작위 생성 섹션 -->
                <div id="content-random" class="tab-pane">
                    <div class="modal-form-group">
                        <label>난입할 포켓몬 수</label>
                        <input type="number" id="random-count" value="5" min="1" max="15" class="w-full border rounded p-2 text-sm" style="background: #fff5f5;">
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div class="modal-form-group">
                            <label>난입 시간 범위 (Arrival Time)</label>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <input type="number" id="at-min" value="0" min="0" class="w-full border rounded p-2 text-sm" placeholder="최소">
                                <span>~</span>
                                <input type="number" id="at-max" value="10" min="0" class="w-full border rounded p-2 text-sm" placeholder="최대">
                            </div>
                        </div>

                        <div class="modal-form-group">
                            <label>포켓몬 체력 범위 (HP / Burst Time)</label>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <input type="number" id="bt-min" value="1" min="1" class="w-full border rounded p-2 text-sm" placeholder="최소">
                                <span>~</span>
                                <input type="number" id="bt-max" value="10" min="1" class="w-full border rounded p-2 text-sm" placeholder="최대">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 사용자 지정 섹션 -->
                <div id="content-manual" class="tab-pane hidden">
                    <div class="modal-form-group">
                        <label>난입 예정 시간 (AT)</label>
                        <input type="number" id="manual-at" value="0" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div class="modal-form-group">
                        <label>포켓몬 체력 (HP / BT)</label>
                        <input type="number" id="manual-bt" value="1" class="w-full border rounded p-2 text-sm">
                    </div>
                    <p style="font-size: 11px; color: #ef4444; margin-top: 10px;">* 특정 포켓몬을 전장에 즉시 투입합니다.</p>
                </div>
            </div>

            <div class="modal-footer" style="background: #fff1f2;">
                <button id="add-process-confirm-btn" class="btn btn-primary" style="background: #e11d48;">공격 개시!</button>
                <button id="close-modal-btn" class="btn" style="border: 1px solid #ddd;">후퇴</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
