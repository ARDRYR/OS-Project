<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Scheduler Simulator</title>
</head>
<body>
    <div id="app">
        <!-- 왼쪽: Control Panel (1/4) -->
        <aside id="control-panel">
            <h2 class="title">Control Panel</h2>
            
            <!-- 그룹 1: 프로세스 추가 및 실행 -->
            <div class="control-group">
                <div class="button-group">
                    <button id="open-modal-btn" class="btn btn-primary">+ 프로세스 추가</button>
                    <button id="run-btn" class="btn btn-success">실행</button>
                </div>
                <!-- 왼쪽 Control 영역의 예정 프로세스 부분 -->
                <div class="control-item">
                    <span class="label">예정 프로세스</span>
                    <span id="process-count-display" class="value text-blue-600 font-bold">0 / 15</span>
                </div>
            </div>

            <!-- 그룹 2: 프로세서 설정 -->
            <div class="control-group core-settings">
                <h3>프로세서 설정</h3>
                <div id="core-container">
                    <!-- 코어 설정 내용 -->
                </div>
            </div>

            <!-- 그룹 3: 소비 전력 -->
            <div class="control-group" id="power-dashboard">
                <h3>소비 전력</h3>
                <div class="power-item"><span>Total:</span> <span id="total-w">0W</span></div>
                <div class="power-item p-core"><span>P-Sum:</span> <span id="p-sum-w">0W</span></div>
                <div class="power-item e-core"><span>E-Sum:</span> <span id="e-sum-w">0W</span></div>
            </div>
        </aside>

        <!-- 오른쪽: Output Panel (3/4) -->
        <main id="output-panel">
            <div class="data-view-container">
                <div class="data-card">
                    <h4>Process Info (AT/BT)</h4>
                    <div id="input-table-view" class="table-wrapper">
                        <p class="empty-msg">프로세스를 추가해주세요.</p>
                    </div>
                </div>
                <div class="data-card">
                    <h4>Execution Results</h4>
                    <div id="result-table-view" class="table-wrapper">
                        <p class="empty-msg">실행 결과가 여기에 표시됩니다.</p>
                    </div>
                </div>
            </div>
            <!-- 레디 큐 부분 -->
            <!-- Ready Queue 섹션: 높이를 자식 요소의 합에 딱 맞춤 -->
            <section id="ready-queue-section" class="data-card" style="padding: 10px; margin-bottom: 12px; height: auto !important; min-height: unset !important;">
                <h4 class="font-bold" style="font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                    Ready Queue 
                    <span style="font-size: 11px; font-weight: normal; color: #666;">(대기 프로세스)</span>
                </h4>
                <div id="ready-queue-container" style="display: flex; gap: 8px; align-items: center; padding: 6px; overflow-x: auto; background: #f8fafc; border-radius: 6px; border: 1px dashed #cbd5e1; height: auto; min-height: 40px; width: 100%;">
                    <!-- 프로세스 아이템이 들어올 곳 -->
                    <p class="empty-msg" style="color: #94a3b8; font-style: italic; font-size: 11px; margin: 0 auto;">현재 대기 중인 프로세스가 없습니다.</p>
                </div>
            </section>
            <section class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-btn active" data-algo="FCFS">FCFS</button>
                    <button class="tab-btn" data-algo="RR">RR</button>
                    <button class="tab-btn" data-algo="SPN">SPN</button>
                    <button class="tab-btn" data-algo="SRTN">SRTN</button>
                    <button class="tab-btn" data-algo="HRRN">HRRN</button>
                    <button class="tab-btn" data-algo="OWN">Custom</button>
                </div>
                
                <div class="tab-content">
                    <div id="rr-quantum-control" class="quantum-box hidden">
                        <label>Time Quantum: </label>
                        <input type="number" id="realtime-tq" value="2" min="1">
                    </div>
                    
                    <div id="gantt-chart-area">
                        <p class="empty-msg mt-20">실행 버튼을 누르면 간트 차트가 나타납니다.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 프로세스 추가 모달 -->
    <div id="process-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-tabs">
                <button id="tab-random" class="modal-tab-btn active">무작위 생성</button>
                <button id="tab-manual" class="modal-tab-btn">사용자 지정</button>
            </div>

            <div class="modal-body">
                <!-- 무작위 생성 섹션 -->
                <div id="content-random" class="tab-pane">
                    <div class="modal-form-group">
                        <label>프로세스 개수</label>
                        <input type="number" id="random-count" value="5" min="1" max="15" class="w-full border rounded p-2 text-sm">
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div class="modal-form-group">
                            <label>Arrival Time 범위</label>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <input type="number" id="at-min" value="0" min="0" class="w-full border rounded p-2 text-sm" placeholder="최소">
                                <span>~</span>
                                <input type="number" id="at-max" value="10" min="0" class="w-full border rounded p-2 text-sm" placeholder="최대">
                            </div>
                        </div>

                        <div class="modal-form-group">
                            <label>Burst Time 범위</label>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <input type="number" id="bt-min" value="1" min="1" class="w-full border rounded p-2 text-sm" placeholder="최소">
                                <span>~</span>
                                <input type="number" id="bt-max" value="10" min="1" class="w-full border rounded p-2 text-sm" placeholder="최대">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 사용자 지정 섹션 -->
                <div id="content-manual" class="tab-pane hidden">
                    <div class="input-group" style="display: flex; flex-direction: column; gap: 5px">
                        <label>Arrival Time (AT)</label>
                        <input type="number" id="manual-at" value="0">
                    </div>
                    <div class="input-group" style="display: flex; flex-direction: column; gap: 5px">
                        <label>Burst Time (BT)</label>
                        <input type="number" id="manual-bt" value="1">
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button id="add-process-confirm-btn" class="btn btn-primary">추가하기</button>
                <button id="close-modal-btn" class="btn">닫기</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
